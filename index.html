<!DOCTYPE html>
<html>
<head>
    <title>Positive or Negative</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
        }

        .container {
            background-color: white;
            padding: 20px;
            margin: 100px auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        input {
            padding: 10px;
            width: 80%;
            margin-bottom: 10px;
        }

        button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        #result {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>

</head>
<body>

<div class="container">
    <h2>Check if a Number is Positive or Negative</h2>

    <input type="number" id="num" placeholder="Enter a number">
    <button onclick="checkNumber()">Check</button>

    <p id="result"></p>
</div>

<script>
    function checkNumber() {
        let number = document.getElementById("num").value;

        if (number > 0) {
            document.getElementById("result").innerHTML = "The number is Positive.";
        } else if (number < 0) {
            document.getElementById("result").innerHTML = "The number is Negative.";
        } else {
            document.getElementById("result").innerHTML = "The number is Zero.";
        }
    }
</script>

</body>
</html>
